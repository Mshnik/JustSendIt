edition = "2023";

package com.redpup.justsendit.model;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.proto";

import "com/redpup/justsendit/model/grade.proto";
import "com/redpup/justsendit/model/board/tile/slope.proto";

/** The category of effect on a skill card or player card. */
enum EffectCategory {
  EFFECT_CATEGORY_UNSET = 0;
  EFFECT_CATEGORY_PLAY = 1;
  EFFECT_CATEGORY_NEXT = 2;
  EFFECT_CATEGORY_PASS = 3;
  EFFECT_CATEGORY_LIFT = 4;
}

/** Icons that can appear on a skill card or player card. */
message Icon {
  oneof type {
    model.Grade grade = 1;
    model.board.tile.Condition condition = 2;
    model.board.tile.Hazard hazard = 3;
    bool wild = 4;
  }
}
