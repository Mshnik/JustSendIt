edition = "2023";

package com.redpup.justsendit.model;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.proto";

/** Days of the game. */
enum Day {
  DAY_UNSET = 0;
  DAY_FRIDAY = 1;
  DAY_SATURDAY = 2;
  DAY_SUNDAY = 3;
}

/** States the game can be in.*/
enum GameState {
  GAME_STATE_UNSET = 0;
  BEFORE_START = 1;
  BETWEEN_DAYS = 2;
  BETWEEN_ROUNDS = 3;
  BETWEEN_TURNS = 4;
  TURN_IN_PROGRESS = 5;
}
