edition = "2023";

package com.redpup.justsendit.model.supply;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.supply.proto";

import "com/redpup/justsendit/model/common.proto";

/** A skill card in a player's deck. */
message SkillCard {
  string name = 1;
  int32 cost = 2;

  // Dice counts
  int32 green_dice = 3;
  int32 blue_dice = 4;
  int32 black_dice = 5;

  repeated model.Icon icons = 6;

  model.EffectCategory category = 7;
  string text = 8;
}

/** A list of skill cards. */
message SkillCardList {
  repeated SkillCard cards = 1;
}
