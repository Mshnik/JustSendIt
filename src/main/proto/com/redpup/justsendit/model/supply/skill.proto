edition = "2023";

package com.redpup.justsendit.model.supply;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.supply.proto";

import "com/redpup/justsendit/model/supply/icon.proto";
import "com/redpup/justsendit/model/common.proto";

/** A skill card in a player's deck, discard, hand, play, or the shop. */
message SkillCard {
  string filename = 1;
  string name = 2;
  int32 cost = 3;

  int32 green_dice = 4;
  int32 blue_dice = 5;
  int32 black_dice = 6;

  repeated Icon icons = 7;

  model.EffectCategory category = 8;
  string text = 9;
  string flavor_text = 10;
}

/** A list of skill cards. */
message SkillCardList {
  repeated SkillCard cards = 1;
}
