edition = "2023";

package com.redpup.justsendit.model.player;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.player.proto";

import "com/redpup/justsendit/model/board/hex/hex_point.proto";
import "google/protobuf/empty.proto";

/** Different decisions a player can make while on the mountain. */
message MountainDecision {
  oneof decision {
    SkiRideDecision ski_ride = 1;
    LiftDecision lift = 2;
    PassDecision pass = 3;
    google.protobuf.Empty exit = 4;
  }

  /** A decision to ski or ride in a given direction. */
  message SkiRideDecision {
    model.board.hex.HexDirection direction = 1;
  }

  /** A decision to ride a lift. */
  message LiftDecision {
    oneof action {
      google.protobuf.Empty ride_up = 1;
      google.protobuf.Empty stay = 2;
    }
  }

  /** A decision to pass. */
  message PassDecision {
    // The name of the card to buy from the shop. Empty if none.
    string buy_card_name = 1;
  }
}

/** Actions a player can take during a ski/ride resolution. */
message SkiRideResolutionAction {
  oneof action {
    string play_card_name = 1;
    google.protobuf.Empty stop = 2;
  }
}
