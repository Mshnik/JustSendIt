edition = "2023";

package com.redpup.justsendit.model.player;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.player.proto";

import "com/redpup/justsendit/model/player/icon.proto";
import "com/redpup/justsendit/model/common.proto";

/** The immutable params associated with a player or upgrade. */
message PlayerCard {
  // The name of this card.
  string name = 1;
  // What day this card is available on.
  Day day = 2;
  
  // V2 fields
  player.Icon icon = 3;
  string passive_ability_text = 4;
  model.EffectCategory signature_category = 5;
  string signature_text = 6;
}

/** A list of player cards. */
message PlayerCardList {
  repeated PlayerCard player = 1;
}
