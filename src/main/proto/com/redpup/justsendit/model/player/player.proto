edition = "2023";

package com.redpup.justsendit.model.player;

option java_multiple_files = true;
option java_package = "com.redpup.justsendit.model.player.proto";

import "com/redpup/justsendit/model/day.proto";
import "com/redpup/justsendit/model/grade.proto";
import "com/redpup/justsendit/model/player/chip.proto";

/** The immutable params associated with a player or upgrade. */
message PlayerCard {
  string name = 1;
  Day day = 2;
  repeated Grade skill_cards = 3;
  repeated TrainingChip chips = 4;
  string ability_name = 5;
  string ability_text = 6;
}

/** A list of player cards. */
message PlayerCardList {
  repeated PlayerCard player = 1;
}
