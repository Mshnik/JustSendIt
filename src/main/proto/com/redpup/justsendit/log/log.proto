edition = "2023";

package com.redpup.justsendit.log;

import "google/protobuf/timestamp.proto";
import "com/redpup/justsendit/model/common.proto";
import "com/redpup/justsendit/model/player/decision.proto";
import "com/redpup/justsendit/model/board/hex/hex_point.proto";

option java_package = "com.redpup.justsendit.log.proto";
option java_multiple_files = true;

// A log message caused by any game action.
message Log {
  // When the log occurred in real time.
  google.protobuf.Timestamp timestamp = 1;

  // When the log occurred in the game.
  model.Day day = 2;
  int32 round = 3;
  int32 turn = 4;
  int32 subturn = 5;

  // Who triggered the log
  string player_name = 6;
  string controller_name = 7;

  // The log that occurred.
  oneof event {
    model.GameState state_transition = 8;
    model.player.MountainDecision mountain_decision = 9;
    PlayerMove player_move = 10;
    SkiRideAttempt ski_ride_attempt = 11;
    SkiRideCrash ski_ride_crash = 12;
  }
}

// A log of a player moving around the mountain.
message PlayerMove {
  model.board.hex.HexPoint from = 1;
  model.board.hex.HexPoint to = 2;
}

// A log of a player attempting to ski/ride a tile.
message SkiRideAttempt {
  int32 total_tile_difficulty = 1;
  string card_name = 2;
  repeated int32 rolled_values = 3;
  int32 total_icon_value = 4;
  int32 cumulative_skill = 5;
  int32 cumulative_wobbles = 6;
  bool success = 7;
}

// A log of a player crashing.
message SkiRideCrash {
  enum Cause {
    CAUSE_UNKNOWN = 0;
    CAUSE_INTENTIONAL = 1;
    CAUSE_WOBBLES = 2;
    CAUSE_NO_CARDS = 3;
  }
  Cause cause = 1;
}
